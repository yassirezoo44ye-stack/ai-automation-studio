name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Only auto-cancel superseded PR runs. A push to main must NOT cancel an
  # in-flight main run: its deploy/release jobs have external side effects
  # (Render deploy hook already POSTed, git tag mid-push) that a
  # cancellation would leave half-applied.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── Backend: syntax + lint + secret scan + schema check + unit tests ───────
  backend:
    name: Backend (Python 3.11)
    runs-on: ubuntu-latest

    # Every STEP reads these. The service container below does NOT — its
    # POSTGRES_USER/PASSWORD/DB are separate hardcoded values that must be
    # kept in sync with this DATABASE_URL by hand (job-level env is not
    # visible to `services:` configuration).
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test_axon
      SESSION_SECRET: ci-test-secret-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_axon
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime + dev dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Syntax check (py_compile)
        run: |
          python -m py_compile main.py
          python -m py_compile app_main.py
          find app -name "*.py" | xargs python -m py_compile
          echo "✅ Syntax OK"

      - name: Lint (ruff) — ratchet against known baseline
        # Zero-tolerance was never actually achievable: this workflow had
        # never dispatched a single job before this phase (see the docker
        # job's comment), so its ruff gate never really ran either. 307
        # pre-existing errors were found; 191 were safe-auto-fixed and 2
        # were confirmed real bugs (fixed directly). The 104 that remain
        # are style-only (E701/E741/E402/F811/F541 + 2 known-safe F821
        # false positives from deferred imports in string type hints) and
        # spread across dozens of files — fixing all of them here would be
        # exactly the "refactor unrelated application code" this phase is
        # scoped not to do. This ratchet blocks the count from *growing*
        # instead of hard-failing on debt that predates this check ever
        # actually running. Follow-up: a dedicated lint-debt-paydown pass.
        run: |
          COUNT=$(ruff check app/ tests/ --exit-zero --output-format=json | python -c "import json,sys; print(len(json.load(sys.stdin)))")
          echo "Current ruff error count: $COUNT (baseline: 104)"
          if [ "$COUNT" -gt 104 ]; then
            echo "::error::Ruff error count increased from baseline 104 to $COUNT — new lint issues introduced"
            ruff check app/ tests/ --output-format=github
            exit 1
          fi

      - name: Secret scan
        run: python scripts/ci_secret_scan.py

      - name: Schema safety check
        # Validates the REAL production schema mechanism — app.factory's
        # lifespan() (idempotent init_db()/ensure_*_table()/init_*_schema()
        # calls) against a fresh database. Not `alembic upgrade head`: the
        # Alembic revision chain is broken beyond migration 001 (`alembic
        # history` fails outright on 003_ai_gateway.py onward), so a gate
        # built around it would fail on every run regardless of any real
        # regression.
        run: python scripts/ci_schema_check.py

      - name: Unit tests
        # `python -m pytest`, NOT the bare `pytest` console script: the
        # console-script entry point does not prepend the CWD to sys.path,
        # so `tests/test_agent_os.py` and `tests/test_ai_platform.py` (the
        # first two files alphabetically) hit `ModuleNotFoundError: No
        # module named 'app'` during collection and abort the whole run —
        # reproduced locally and confirmed as the root cause of every
        # "Unit tests" failure since this pipeline started dispatching
        # jobs. `python -m pytest` inserts CWD into sys.path[0], which
        # makes the repo-root `app` package importable.
        #
        # On failure, surface pytest's own output as workflow annotations
        # (::error::) so it's readable from the public Checks API without
        # needing log-download permissions (which requires repo admin
        # rights, even on public repos). Batched a few lines per annotation
        # to stay well under GitHub's per-run annotation cap. `set +e`
        # because we need the exit code AFTER tee, not an early abort from
        # the `pipefail`-tripped pipeline.
        run: |
          set +e
          python -m pytest tests/ -v --tb=short 2>&1 | tee /tmp/pytest_output.log
          rc=${PIPESTATUS[0]}
          if [ "$rc" -ne 0 ]; then
            tail -n 200 /tmp/pytest_output.log | awk 'BEGIN{n=0} {buf=buf $0 "%0A"; n++} n==10{print buf; buf=""; n=0} END{if(n>0) print buf}' | while IFS= read -r chunk; do
              echo "::error::${chunk}"
            done
          fi
          exit "$rc"

      - name: Dependency vulnerability scan (pip-audit)
        # Informational for now: this is the first time it's run in CI at
        # all, so today's run establishes the real baseline rather than
        # gating on an unknown, potentially-noisy result. pip-audit is
        # installed via requirements-dev.txt so it benefits from the pip
        # cache above.
        continue-on-error: true
        run: pip-audit -r requirements.txt

  # ── Frontend: TypeScript check + ESLint + audit + tests + build ────────────
  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Dependency vulnerability scan (npm audit)
        # --audit-level=high: gate only on high/critical advisories. An
        # advisory database is a moving target — without a threshold, any
        # newly-disclosed low/moderate advisory in a transitive dep would
        # block deploys on commits with zero code changes.
        run: npm audit --omit=dev --audit-level=high

      - name: TypeScript type check
        run: npm run typecheck

      - name: ESLint (strict — zero errors, zero warnings)
        # The Frontend Performance Cleanup phase drove warnings 87 → 0;
        # --max-warnings 0 keeps it there.
        run: npm run lint:strict

      - name: Vitest unit tests
        run: npm test

      - name: Production build
        run: npm run build

  # ── Docker: build the multi-stage image ────────────────────────────────────
  # Uses the plain Docker CLI (preinstalled on ubuntu-latest) instead of the
  # docker/setup-buildx-action / docker/build-push-action actions — simpler,
  # no third-party dependency. Note: the historical 100%-instant-failure of
  # this workflow was caused by invalid YAML in the ESLint step (see its
  # comment), not by these actions. Restoring buildx + gha layer caching is
  # a reasonable follow-up if image build time becomes a problem.
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build image (no push)
        run: docker build -t axon:ci-${{ github.sha }} .

  # ── Deploy: trigger Render only after CI passes on main ─────────────────────
  # render.yaml has autoDeploy: false — Render no longer deploys on every
  # push by itself. This is now the only trigger. Requires a repo secret
  # RENDER_DEPLOY_HOOK_URL — see DEPLOYMENT.md for how to create it; it
  # can't be created from here.
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy hook
        # Secret passed via env (not interpolated into the command string)
        # so the value never appears in the runner's generated script file.
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::error::RENDER_DEPLOY_HOOK_URL secret is not set — nothing can deploy (render.yaml has autoDeploy: false). Follow the one-time setup in DEPLOYMENT.md."
            exit 1
          fi
          # ref pins the deploy to the exact commit this CI run validated.
          # Without it, Render builds whatever the branch tip is at hook
          # time — which may be a LATER, unvalidated push that landed while
          # this run's tests were executing.
          if echo "$RENDER_DEPLOY_HOOK_URL" | grep -q '?'; then
            curl -fsS -X POST "${RENDER_DEPLOY_HOOK_URL}&ref=${GITHUB_SHA}"
          else
            curl -fsS -X POST "${RENDER_DEPLOY_HOOK_URL}?ref=${GITHUB_SHA}"
          fi

  # ── Post-deploy smoke test ───────────────────────────────────────────────────
  # No automatic rollback: that needs Render's full REST API + an API key
  # that isn't set up (see ROLLBACK.md for the manual rollback procedure via
  # Render's own dashboard). This job's job is visibility, not remediation.
  smoke-test:
    name: Post-deploy health check
    runs-on: ubuntu-latest
    needs: [deploy]

    steps:
      - name: Verify the new build is live, then check /health/deep
        # Render's zero-downtime deploy keeps the OLD instance serving 200
        # for the entire duration of the new build, and never routes to a
        # new instance that fails its health check — so simply curling
        # /health/deep would false-PASS against the old build every time.
        # Instead: /health exposes "commit" (RENDER_GIT_COMMIT); poll until
        # it equals the SHA this run deployed, THEN require /health/deep.
        run: |
          URL="${{ vars.PRODUCTION_URL || 'https://ai-automation-studio.onrender.com' }}"
          echo "Polling $URL/health until running commit == $GITHUB_SHA (up to 15 min)"
          for i in $(seq 1 60); do
            sleep 15
            LIVE=$(curl -fsS "$URL/health" | python3 -c "import json,sys; print(json.load(sys.stdin).get('commit',''))" 2>/dev/null || echo "")
            if [ "$LIVE" = "$GITHUB_SHA" ]; then
              echo "New build is live (commit matches, ~$((i*15))s after trigger)."
              if curl -fsS "$URL/health/deep" -o /tmp/health.json; then
                cat /tmp/health.json
                echo "Production deep health check passed."
                exit 0
              fi
              echo "::error::New build is live but /health/deep is unhealthy — no automatic rollback is configured; see ROLLBACK.md."
              cat /tmp/health.json 2>/dev/null || true
              exit 1
            fi
            echo "Attempt $i/60: running commit is '${LIVE:-unknown}', waiting for new build"
          done
          echo "::error::Running commit never matched $GITHUB_SHA within 15 min — the Render build may have failed or is unusually slow. Check the Render dashboard (Events tab). If /health has no 'commit' field, the running build predates this pipeline; this check will work from the next deploy onward."
          exit 1

  # ── Release: version bump + changelog + GitHub Release ──────────────────────
  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: [smoke-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: release
        name: Bump version + update CHANGELOG.md
        run: python scripts/ci_release.py

      - name: Tag + push
        # [skip ci] on the release commit message is load-bearing: without
        # it, this push to main would re-trigger this same workflow,
        # which would deploy and release again, which would push again —
        # an infinite loop.
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          if git rev-parse -q --verify "refs/tags/$VERSION" >/dev/null; then
            echo "::error::Tag $VERSION already exists — refusing to overwrite. Likely a partially-completed earlier release; reconcile manually (delete the stale tag or bump past it)."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: release $VERSION [skip ci]"
          git tag "$VERSION"
          # --atomic: the branch commit and the tag land together or not at
          # all — a network blip can't leave a release commit on main with
          # no matching tag (which would poison the next run's changelog).
          git push --atomic origin HEAD:main "refs/tags/$VERSION"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.release.outputs.version }}" \
            --title "${{ steps.release.outputs.version }}" \
            --notes-file .release-notes.md
