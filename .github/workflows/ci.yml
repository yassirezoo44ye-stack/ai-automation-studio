name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: syntax check + unit tests ─────────────────────────────────────
  backend:
    name: Backend (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime + dev dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Syntax check (py_compile)
        run: |
          python -m py_compile main.py
          python -m py_compile app_main.py
          find app -name "*.py" | xargs python -m py_compile
          echo "✅ Syntax OK"

      - name: Unit tests
        run: pytest tests/ -v --tb=short
        env:
          DATABASE_URL: postgresql://test:test@localhost/test_axon
          SESSION_SECRET: ci-test-secret-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa

  # ── Frontend: TypeScript check + Vite production build ─────────────────────
  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build

  # ── Docker: build the multi-stage image ────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: axon:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
