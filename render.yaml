services:
  - type: web
    name: ai-automation-studio
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ai-studio-db
          property: connectionString
      - key: PORT
        value: "8000"

databases:
  - name: ai-studio-db
    plan: free
    databaseName: aistudio
