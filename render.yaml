services:
  - type: web
    name: ai-automation-studio
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: ENVIRONMENT
        value: "production"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: APP_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ai-studio-db
          property: connectionString
      - key: PORT
        value: "8000"

databases:
  - name: ai-studio-db
    plan: starter
    databaseName: aistudio
